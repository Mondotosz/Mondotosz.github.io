<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondotosz</title>
    <link rel="stylesheet" href="css/tailwind.css">
</head>

<body class="bg-white text-black dark:bg-gray-600 dark:text-gray-300">
    <nav class="w-full h-16 mx-auto px-2 bg-gray-600 text-gray-300 dark:bg-gray-800 dark:text-gray-300">
        <div class="flex flex-col justify-center h-full">
            <div class="grid grid-cols-4 gap-4">

                <div class="col-span-2 flex flex-row justify-center">

                </div>
                <div class="flex flex-row justify-end">
                    <button id="toggleDarkMode"
                        class="my-auto p-2 font-bold bg-indigo-500 text-purple-900 dark:bg-purple-500 rounded-lg dark:text-white">
                        <img src="/svg/sun.svg" style="height:1rem;" alt="toggle">

                </div>

        </div>

    <script type="module" src="js/nav.js"></script>
